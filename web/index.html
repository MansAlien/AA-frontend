      body {
        margin: 0;
        padding: 0;
        /* Prevent browser back/forward navigation on horizontal scroll */
        overscroll-behavior-x: none;
        overscroll-behavior-y: auto;
      }

      /* Prevent horizontal overscroll on the entire page */
      html {
        overscroll-behavior-x: none;
      }

      /* Splash Screen Styles */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          #f5f0e8 0%,
          #e8dcc8 50%,
          #f0e5d5 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
        overflow: hidden;
      }

      /* Decorative background shapes */
      #splash-screen::before {
        content: "";
        position: absolute;
        top: -20%;
        right: -10%;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(247, 147, 30, 0.08) 0%,
          transparent 70%
        );
        border-radius: 50%;
        animation: float 6s ease-in-out infinite;
      }

      #splash-screen::after {
        content: "";
        position: absolute;
        bottom: -15%;
        left: -10%;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(14, 15, 59, 0.05) 0%,
          transparent 70%
        );
        border-radius: 50%;
        animation: float 8s ease-in-out infinite reverse;
      }

      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo-container {
        position: relative;
        margin-bottom: 40px;
        animation: fadeInScale 1s ease-out;
        z-index: 1;
      }

      .splash-logo {
        width: 160px;
        height: 160px;
        background: white;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 40px rgba(14, 15, 59, 0.15);
        position: relative;
        overflow: hidden;
        border: 3px solid #f7931e;
      }

      .splash-logo::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent,
          rgba(247, 147, 30, 0.08),
          transparent
        );
        animation: shimmer 3s infinite;
      }

      .splash-logo svg {
        width: 100px;
        height: 100px;
        z-index: 1;
      }

      .splash-title {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        font-size: 42px;
        font-weight: 800;
        color: #0e0f3b;
        margin-bottom: 12px;
        text-align: center;
        animation: fadeInUp 1s ease-out 0.3s both;
        letter-spacing: -1px;
        z-index: 1;
        position: relative;
      }

      .splash-title span {
        color: #f7931e;
      }

      .splash-subtitle {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        font-size: 18px;
        font-weight: 500;
        color: #444444;
        margin-bottom: 50px;
        text-align: center;
        animation: fadeInUp 1s ease-out 0.5s both;
        z-index: 1;
        position: relative;
      }

      .splash-loader {
        width: 60px;
        height: 60px;
        position: relative;
        animation: fadeIn 1s ease-out 0.7s both;
      }

      .splash-loader::before,
      .splash-loader::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #f7931e;
      }

      .splash-loader::before {
        width: 60px;
        height: 60px;
        animation: spin 1.5s linear infinite;
      }

      .splash-loader::after {
        width: 45px;
        height: 45px;
        top: 7.5px;
        left: 7.5px;
        border-top-color: white;
        animation: spin 1s linear infinite reverse;
      }

      .splash-loading-text {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: #666666;
        margin-top: 20px;
        text-align: center;
        animation: fadeIn 1s ease-out 0.9s both;
        z-index: 1;
        position: relative;
      }

      /* Animations */
      @keyframes fadeInScale {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes shimmer {
        0% {
          transform: translateX(-100%) translateY(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(100%) translateY(100%) rotate(45deg);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .splash-logo {
          width: 140px;
          height: 140px;
        }

        .splash-logo svg {
          width: 90px;
          height: 90px;
        }

        .splash-title {
          font-size: 24px;
        }

        .splash-subtitle {
          font-size: 16px;
        }
      }

    <script>
      // Track loading state
      let flutterReady = false;
      let domReady = false;
      let assetsReady = false;
      let splashRemoved = false;
      let readyCheckInterval = null;

      function updateLoadingText(text) {
        const loadingText = document.getElementById("loading-text");
        if (loadingText) {
          loadingText.textContent = text;
        }
      }

      function removeSplashScreen() {
        if (splashRemoved) return;

        const splashScreen = document.getElementById("splash-screen");
        if (splashScreen) {
          splashRemoved = true;
          updateLoadingText("Ready!");

          // Clear any intervals
          if (readyCheckInterval) {
            clearInterval(readyCheckInterval);
          }

          splashScreen.classList.add("fade-out");
          setTimeout(() => {
            splashScreen.remove();
          }, 500);
        }
      }

      function checkIfFullyLoaded() {
        // Check if Flutter app is fully rendered and interactive
        const flutterView = document.querySelector("flutter-view");
        const fltGlassPane = document.querySelector("flt-glass-pane");

        // Check if there are any pending images
        const images = document.querySelectorAll("img");
        let allImagesLoaded = true;
        images.forEach((img) => {
          if (!img.complete || img.naturalHeight === 0) {
            allImagesLoaded = false;
          }
        });

        // Check if fonts are loaded
        const fontsLoaded = document.fonts
          ? document.fonts.status === "loaded"
          : true;

        // Mark as ready if Flutter view exists and is rendered
        if (flutterView || fltGlassPane) {
          assetsReady = allImagesLoaded && fontsLoaded;
        }

        return flutterReady && domReady && assetsReady;
      }

      function checkAndRemoveSplash() {
        if (checkIfFullyLoaded()) {
          // Add extra delay to ensure everything is painted and settled
          setTimeout(removeSplashScreen, 800);
        } else {
          // Update loading text based on what's ready
          if (!domReady) {
            updateLoadingText("Loading resources...");
          } else if (!flutterReady) {
            updateLoadingText("Initializing app...");
          } else if (!assetsReady) {
            updateLoadingText("Loading assets...");
          }
        }
      }

      // Listen for Flutter first frame
      window.addEventListener("flutter-first-frame", function () {
        flutterReady = true;
        checkAndRemoveSplash();
      });

      // Wait for DOM to be fully loaded
      if (document.readyState === "complete") {
        domReady = true;
        checkAndRemoveSplash();
      } else {
        window.addEventListener("load", function () {
          domReady = true;
          checkAndRemoveSplash();
        });
      }

      // Wait for fonts to load
      if (document.fonts) {
        document.fonts.ready.then(function () {
          checkAndRemoveSplash();
        });
      }

      // Periodically check if everything is ready
      readyCheckInterval = setInterval(function () {
        if (splashRemoved) {
          clearInterval(readyCheckInterval);
          return;
        }
        checkAndRemoveSplash();
      }, 200);

      // Update loading text with animated dots
      let loadingDots = 0;
      const loadingInterval = setInterval(function () {
        if (splashRemoved) {
          clearInterval(loadingInterval);
          return;
        }
        loadingDots = (loadingDots + 1) % 4;
        const dots = ".".repeat(loadingDots);

        let baseText = "Loading resources";
        if (domReady && !flutterReady) {
          baseText = "Initializing app";
        } else if (flutterReady && !assetsReady) {
          baseText = "Loading assets";
        }

        updateLoadingText(baseText + dots);
      }, 500);

      // Fallback: Remove splash screen after 20 seconds if something goes wrong
      setTimeout(function () {
        clearInterval(loadingInterval);
        clearInterval(readyCheckInterval);
        removeSplashScreen();
      }, 20000);
    </script>

    <!-- Version Check Script -->
    <script>
      // Version checking system
      const VERSION_CHECK_INTERVAL = 5 * 60 * 1000; // Check every 5 minutes
      const VERSION_STORAGE_KEY = "app_version";
      const LAST_CHECK_KEY = "last_version_check";

      let currentVersion = null;
      let versionCheckInterval = null;

      async function fetchCurrentVersion() {
        try {
          // Add timestamp to prevent caching
          const response = await fetch("/version.json?t=" + Date.now(), {
            cache: "no-cache",
            headers: {
              "Cache-Control": "no-cache",
              Pragma: "no-cache",
            },
          });

          if (!response.ok) {
            console.warn("Failed to fetch version.json");
            return null;
          }

          const versionData = await response.json();
          return versionData;
        } catch (error) {
          console.warn("Error fetching version:", error);
          return null;
        }
      }

      async function checkForUpdates() {
        const now = Date.now();
        const lastCheck = localStorage.getItem(LAST_CHECK_KEY);

        // Don't check too frequently (minimum 1 minute between checks)
        if (lastCheck && now - parseInt(lastCheck) < 60000) {
          return;
        }

        localStorage.setItem(LAST_CHECK_KEY, now.toString());

        const latestVersion = await fetchCurrentVersion();

        if (!latestVersion) {
          return;
        }

        const storedVersion = localStorage.getItem(VERSION_STORAGE_KEY);

        // First time loading or version changed
        if (!storedVersion) {
          localStorage.setItem(VERSION_STORAGE_KEY, latestVersion.version);
          currentVersion = latestVersion.version;
        } else if (storedVersion !== latestVersion.version) {
          // Perform silent update in background
          performSilentUpdate(latestVersion);
        } else {
          currentVersion = storedVersion;
        }
      }

      function performSilentUpdate(versionData) {
        // Update stored version
        localStorage.setItem(VERSION_STORAGE_KEY, versionData.version);

        // Perform hard refresh silently
        window.location.reload(true);
      }

      // Initial version check on load
      window.addEventListener("load", function () {
        setTimeout(checkForUpdates, 2000); // Check 2 seconds after load
      });

      // Periodic version check
      versionCheckInterval = setInterval(
        checkForUpdates,
        VERSION_CHECK_INTERVAL,
      );

      // Check when tab becomes visible (user returns to tab)
      document.addEventListener("visibilitychange", function () {
        if (!document.hidden) {
          checkForUpdates();
        }
      });
    </script>
